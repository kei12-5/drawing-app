<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>お絵かき</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b8def;
      --canvas-bg: #ffffff;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      touch-action: none;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 1rem;
      letter-spacing: -0.02em;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.65rem 1rem;
      margin-bottom: 1rem;
      max-width: min(900px, 100%);
      justify-content: center;
    }
    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .toolbar input[type="color"] {
      width: 2.5rem;
      height: 2rem;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: var(--surface);
    }
    .toolbar input[type="range"] {
      width: 7rem;
      accent-color: var(--accent);
    }
    .toolbar button {
      padding: 0.5rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .toolbar button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .toolbar button:active {
      transform: scale(0.98);
    }
    .toolbar button.active {
      border-color: var(--accent);
      background: rgba(91, 141, 239, 0.15);
      color: #a8c4f8;
    }
    .canvas-wrap {
      width: min(900px, 100%);
      flex: 1;
      min-height: 280px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--canvas-bg);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }
    #canvas {
      display: block;
      width: 100%;
      height: auto;
      touch-action: none;
    }
  </style>
</head>
<body>
  <h1>お絵かき</h1>
  <div class="toolbar" role="toolbar" aria-label="描画ツール">
    <label>
      色
      <input type="color" id="color" value="#1a1a2e" title="色">
    </label>
    <label>
      太さ <span id="size-label">4</span>px
      <input type="range" id="size" min="1" max="48" value="4" title="線の太さ">
    </label>
    <button type="button" id="pen" class="active" title="ペン">ペン</button>
    <button type="button" id="eraser" title="消しゴム">消しゴム</button>
    <button type="button" id="clear" title="すべて消す">クリア</button>
    <button type="button" id="save" title="画像を保存">保存</button>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas" width="900" height="500" aria-label="描画キャンバス"></canvas>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const colorInput = document.getElementById("color");
      const sizeInput = document.getElementById("size");
      const sizeLabel = document.getElementById("size-label");
      const penBtn = document.getElementById("pen");
      const eraserBtn = document.getElementById("eraser");
      const clearBtn = document.getElementById("clear");
      const saveBtn = document.getElementById("save");

      const ASPECT = 900 / 500;

      const CURSOR_PEN = (function () {
        const svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">' +
          '<path d="M3 29 L19 7 L25 13 L9 27 Z" fill="#3d4455" stroke="#c9d4e8" stroke-width="1"/>' +
          '<path d="M3 29 L7 30 L6 27 Z" fill="#d4a84b"/>' +
          '</svg>';
        return 'url("data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg) + '") 4 28, crosshair';
      })();

      const CURSOR_ERASER = (function () {
        const svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">' +
          '<rect x="5" y="5" width="20" height="14" rx="3" fill="#f5c6d6" stroke="#a85c72" stroke-width="1.2"/>' +
          '<rect x="3" y="19" width="24" height="9" rx="2" fill="#aeb0b8" stroke="#6e7078" stroke-width="1"/>' +
          '</svg>';
        return 'url("data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg) + '") 16 27, crosshair';
      })();

      function syncCanvasCursor() {
        canvas.style.cursor = isEraser ? CURSOR_ERASER : CURSOR_PEN;
      }

      let drawing = false;
      let lastX = 0;
      let lastY = 0;
      let isEraser = false;

      function whiteFill() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      let initialized = false;

      function resizeCanvas() {
        const wrap = canvas.parentElement;
        const cssW = Math.max(1, Math.floor(wrap.clientWidth));
        const cssH = Math.max(280, Math.round(cssW / ASPECT));
        if (canvas.width === cssW && canvas.height === cssH) {
          if (!initialized) {
            whiteFill();
            initialized = true;
          }
          return;
        }

        const snap = document.createElement("canvas");
        snap.width = canvas.width;
        snap.height = canvas.height;
        snap.getContext("2d").drawImage(canvas, 0, 0);

        canvas.width = cssW;
        canvas.height = cssH;
        whiteFill();
        ctx.drawImage(snap, 0, 0, cssW, cssH);
        initialized = true;
      }

      function clientToCanvas(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = ((clientX - rect.left) / rect.width) * canvas.width;
        const y = ((clientY - rect.top) / rect.height) * canvas.height;
        return { x, y };
      }

      function lineTo(x, y) {
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = parseInt(sizeInput.value, 10);
        if (isEraser) {
          ctx.globalCompositeOperation = "destination-out";
          ctx.strokeStyle = "rgba(0,0,0,1)";
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = colorInput.value;
        }
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        lastX = x;
        lastY = y;
      }

      function start(e) {
        e.preventDefault();
        drawing = true;
        const p = "touches" in e ? e.touches[0] : e;
        const { x, y } = clientToCanvas(p.clientX, p.clientY);
        lastX = x;
        lastY = y;
      }

      function move(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = "touches" in e ? e.touches[0] : e;
        const { x, y } = clientToCanvas(p.clientX, p.clientY);
        lineTo(x, y);
      }

      function end(e) {
        if (e) e.preventDefault();
        drawing = false;
      }

      canvas.addEventListener("mousedown", start);
      canvas.addEventListener("mousemove", move);
      window.addEventListener("mouseup", end);
      canvas.addEventListener("mouseleave", end);

      canvas.addEventListener("touchstart", start, { passive: false });
      canvas.addEventListener("touchmove", move, { passive: false });
      canvas.addEventListener("touchend", end);
      canvas.addEventListener("touchcancel", end);

      sizeInput.addEventListener("input", function () {
        sizeLabel.textContent = sizeInput.value;
      });

      penBtn.addEventListener("click", function () {
        isEraser = false;
        penBtn.classList.add("active");
        eraserBtn.classList.remove("active");
        syncCanvasCursor();
      });

      eraserBtn.addEventListener("click", function () {
        isEraser = true;
        eraserBtn.classList.add("active");
        penBtn.classList.remove("active");
        syncCanvasCursor();
      });

      clearBtn.addEventListener("click", function () {
        whiteFill();
      });

      saveBtn.addEventListener("click", function () {
        const link = document.createElement("a");
        link.download = "drawing-" + new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-") + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });

      window.addEventListener("resize", resizeCanvas);

      resizeCanvas();
      syncCanvasCursor();
    })();
  </script>
</body>
</html>
